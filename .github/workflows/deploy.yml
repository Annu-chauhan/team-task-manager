name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [main]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Replace Annu-chauhan and team-task-manager if your HF username/space name differs
          git remote add hf https://Annu-chauhan:$HF_TOKEN@huggingface.co/spaces/Annu-chauhan/team-task-manager
          git push --force hf main:main
